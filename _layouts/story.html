---
layout: default
---

<article class="story">
  <header class="story-header">
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p class="story-description">{{ page.description }}</p>
    {% endif %}
    {% if page.status %}
      <p class="story-status">Status: {{ page.status }}</p>
    {% endif %}
  </header>

  <div class="story-content">
    {{ content }}
  </div>

  <footer class="story-footer">
    <p><a href="{{ '/' | relative_url }}">← Back to all stories</a></p>
  </footer>
</article>
